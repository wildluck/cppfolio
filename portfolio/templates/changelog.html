{{meta title="Changelog" nav="changelog"}}

<div class="page-header">
    <p class="section-label">changelog</p>
    <h1>Changelog</h1>
    <p>Updates to this site.</p>
</div>

<section class="section">
    <div class="timeline">
        {{#each CHANGELOG as entry}}
        <div class="timeline-item">
            <div class="timeline-line">
                <div class="timeline-dot"></div>
                <div class="timeline-track"></div>
            </div>
            <div class="timeline-content">
                <p class="timeline-period">{{entry.date}}</p>
                <p
                    class="timeline-role"
                    style="font-family: var(--mono); font-size: 0.9rem"
                >
                    v{{entry.version}}
                </p>
                <ul class="timeline-achievements" style="margin-top: 0.5rem">
                    {{#each entry.changes as change}}
                    <li>{{change}}</li>
                    {{/each}}
                </ul>
            </div>
        </div>
        {{/each}}
    </div>
</section>
