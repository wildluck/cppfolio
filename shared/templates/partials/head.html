<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{meta_description}}" />
    <meta property="og:title" content="{{name}}" />
    <meta property="og:description" content="{{meta_description}}" />
    <meta property="og:image" content="{{meta_og_image}}" />
    <meta property="og:url" content="{{site_url}}" />
    <link rel="icon" href="/static/favicon.ico" />
    <title>{{name}} - {{META_TITLE}}</title>
    <style>
        /* ── Fonts ── */
        @import url("https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap");

        /* ── Tokens ── */
        :root {
            --bg: #0a0e12;
            --bg2: #111720;
            --bg3: #1a2230;
            --border: #1e2d3d;
            --border2: #2a3f55;
            --text: #cdd9e5;
            --text2: #768a9e;
            --text3: #4a6070;
            --accent: #00d4aa;
            --accent2: #00a88a;
            --accent-dim: #00d4aa22;
            --mono: "Space Mono", monospace;
            --sans: "Syne", sans-serif;
            --max-w: 1200px;
            --radius: 8px;
            --radius-lg: 14px;
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Reset ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--sans);
            font-size: 16px;
            line-height: 1.7;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            transition: color var(--transition);
        }
        a:hover {
            color: var(--accent2);
        }
        img {
            max-width: 100%;
            display: block;
        }

        /* ── Layout ── */
        .container {
            width: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ── Nav ── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 18, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 64px;
        }
        .nav-brand {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--text);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-brand span {
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 0.25rem;
            margin-left: auto;
            list-style: none;
        }
        .nav-links a {
            display: block;
            padding: 0.4rem 0.85rem;
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--text2);
            border-radius: var(--radius);
            letter-spacing: 0.04em;
            transition:
                color var(--transition),
                background var(--transition);
        }
        .nav-links a:hover {
            color: var(--text);
            background: var(--bg3);
        }
        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ── Main ── */
        main {
            padding: 4rem 0 6rem;
        }

        /* ── Footer ── */
        .footer {
            border-top: 1px solid var(--border);
            padding: 2rem 0;
        }
        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .footer p {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text3);
        }
        .footer-links {
            display: flex;
            gap: 1.5rem;
        }
        .footer-links a {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text3);
            transition: color var(--transition);
        }
        .footer-links a:hover {
            color: var(--accent);
        }

        /* ── Shared components ── */
        .section-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            transition: border-color var(--transition);
        }
        .card:hover {
            border-color: var(--border2);
        }

        .tag {
            display: inline-block;
            padding: 0.2em 0.65em;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--accent);
            letter-spacing: 0.03em;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3em 0.8em;
            background: var(--accent-dim);
            border: 1px solid var(--accent2);
            border-radius: 20px;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--accent);
        }
        .badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ── Grid helpers ── */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.25rem;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        /* ── Skill bars ── */
        .skill-bar {
            margin-bottom: 1.1rem;
        }
        .skill-bar:last-child {
            margin-bottom: 0;
        }
        .skill-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.45rem;
        }
        .skill-bar-name {
            font-family: var(--mono);
            font-size: 0.82rem;
            color: var(--text);
        }
        .skill-bar-pct {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--accent);
        }
        .skill-bar-track {
            height: 4px;
            background: var(--bg3);
            border-radius: 2px;
            overflow: hidden;
        }
        .skill-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
        }

        /* ── Timeline ── */
        .timeline {
            display: grid;
            gap: 2rem;
        }
        .timeline-item {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0 1.5rem;
        }
        .timeline-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 0.35rem;
        }
        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg);
            flex-shrink: 0;
        }
        .timeline-track {
            width: 1px;
            flex: 1;
            background: var(--border);
            margin-top: 0.4rem;
        }
        .timeline-item:last-child .timeline-track {
            display: none;
        }
        .timeline-period {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--accent);
            margin-bottom: 0.3rem;
            letter-spacing: 0.03em;
        }
        .timeline-role {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.15rem;
        }
        .timeline-company {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 0.6rem;
        }
        .timeline-desc {
            font-size: 0.9rem;
            color: var(--text2);
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }
        .timeline-achievements {
            list-style: none;
            display: grid;
            gap: 0.35rem;
        }
        .timeline-achievements li {
            font-size: 0.85rem;
            color: var(--text2);
            padding-left: 1rem;
            position: relative;
        }
        .timeline-achievements li::before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-size: 0.7rem;
            top: 0.2rem;
        }

        /* ── Hero ── */
        .hero {
            padding: 5rem 0 4rem;
        }
        .hero-label {
            margin-bottom: 1.5rem;
        }
        .hero-name {
            font-size: clamp(2.8rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 0.75rem;
        }
        .hero-name span {
            color: var(--accent);
        }
        .hero-position {
            font-family: var(--mono);
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            color: var(--text2);
            margin-bottom: 1.25rem;
            letter-spacing: 0.03em;
        }
        .hero-tagline {
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            color: var(--text2);
            max-width: 560px;
            line-height: 1.65;
            margin-bottom: 2.5rem;
        }
        .hero-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.4rem;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }
        .btn-primary:hover {
            background: var(--accent2);
            color: var(--bg);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border2);
        }
        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Page sections spacing ── */
        .section {
            margin-bottom: 5rem;
        }
        .section:last-child {
            margin-bottom: 0;
        }

        /* ── Project card ── */
        .project-card {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .project-card-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }
        .project-card-link {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text3);
            flex-shrink: 0;
            transition: color var(--transition);
        }
        .project-card-link:hover {
            color: var(--accent);
        }
        .project-card-desc {
            font-size: 0.9rem;
            color: var(--text2);
            line-height: 1.6;
            flex: 1;
        }
        .project-card-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        /* ── Contact cards ── */
        .contact-card {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .contact-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            background: var(--bg3);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--accent);
            flex-shrink: 0;
        }
        .contact-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text3);
            margin-bottom: 0.2rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .contact-value {
            font-size: 0.9rem;
            color: var(--text);
        }
        .contact-value a {
            color: var(--text);
        }
        .contact-value a:hover {
            color: var(--accent);
        }

        /* ── Page header (non-hero pages) ── */
        .page-header {
            padding: 3.5rem 0 3rem;
        }
        .page-header h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }
        .page-header p {
            font-size: 1rem;
            color: var(--text2);
        }
        .card-sublabel {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 1rem;
        }
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .explore-card {
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
        .explore-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.35rem;
            transition: color var(--transition);
        }
        .explore-card:hover .explore-card-title {
            color: var(--accent);
        }
        .explore-card-desc {
            font-size: 0.88rem;
            color: var(--text2);
            line-height: 1.55;
        }
        /* ── Post ── */
        .post-header {
            padding: 3.5rem 0 2.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }
        .post-title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
        }
        .post-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .post-content {
            max-width: 720px;
        }
        .post-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 2.5rem 0 0.75rem;
            color: var(--text);
        }
        .post-content h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 2rem 0 0.5rem;
            color: var(--text);
        }
        .post-content p {
            color: var(--text2);
            line-height: 1.85;
            margin-bottom: 1.25rem;
            font-size: 0.97rem;
        }
        .post-content pre {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .post-content code {
            font-family: var(--mono);
            font-size: 0.82rem;
            color: var(--accent);
            line-height: 1.7;
        }
        .post-content ul {
            color: var(--text2);
            padding-left: 1.5rem;
            margin-bottom: 1.25rem;
        }
        .post-content li {
            margin-bottom: 0.35rem;
            font-size: 0.97rem;
            line-height: 1.75;
        }
        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1.25rem;
            color: var(--text2);
            font-style: italic;
            margin-bottom: 1.25rem;
        }
        /* ── Post card (index) ── */
        .post-card {
            display: block;
            text-decoration: none;
        }
        .post-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .post-card-date {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--accent);
        }
        .post-card-tags {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
        }
        .post-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.4rem;
            transition: color var(--transition);
        }
        .post-card:hover .post-card-title {
            color: var(--accent);
        }
        .post-card-summary {
            font-size: 0.88rem;
            color: var(--text2);
            line-height: 1.6;
        }
    </style>
</head>
